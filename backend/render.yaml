services:
  - type: web
    name: ai-money-brain-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-money-brain-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: APP_NAME
        value: "AI Money Brain"
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: ai-money-brain-db
    region: oregon
    plan: free
    databaseName: ai_money_brain
    user: ai_money_brain_user
